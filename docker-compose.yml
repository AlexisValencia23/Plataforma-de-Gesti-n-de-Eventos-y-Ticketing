version: '3.8'

services:
  # --- BASE DE DATOS CENTRALIZADA POSTGRESQL (REEMPLAZA A MYSQL) ---
  db-postgres:
    image: postgres:15
    container_name: postgres-container
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: eventos_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ticketing-network

  # --- MICROSERVICIOS ---

  ms-usuarios:
    build:
      context: ./ms-usuarios
    container_name: ms-usuarios-container
    ports:
      - "8081:8081"
    environment:
      - DB_URL=jdbc:postgresql://db-postgres:5432/eventos_db
      - DB_USER=postgres
      - DB_PASSWORD=root
    depends_on:
      - db-postgres
    networks:
      - ticketing-network

  ms-eventos:
    build:
      context: ./ms-eventos
    container_name: ms-eventos-container
    ports:
      - "8082:8082"
    environment:
      - DB_URL=jdbc:postgresql://db-postgres:5432/eventos_db
      - DB_USER=postgres
      - DB_PASSWORD=root
    depends_on:
      - db-postgres
    networks:
      - ticketing-network

  ms-tickets:
    build:
      context: ./ms-tickets
    container_name: ms-tickets-container
    ports:
      - "8083:8083"
    environment:
      - DB_URL=jdbc:postgresql://db-postgres:5432/eventos_db
      - DB_USER=postgres
      - DB_PASSWORD=root
    depends_on:
      - db-postgres
    networks:
      - ticketing-network

  ms-pagos:
    build:
      context: ./ms-pagos
    container_name: ms-pagos-container
    ports:
      - "8084:8084"
    environment:
      - DB_URL=jdbc:postgresql://db-postgres:5432/eventos_db
      - DB_USER=postgres
      - DB_PASSWORD=root
    depends_on:
      - db-postgres
    networks:
      - ticketing-network

  ms-lugares:
    build:
      context: ./ms-lugares
    container_name: ms-lugares-container
    ports:
      - "8085:8085"
    environment:
      - DB_URL=jdbc:postgresql://db-postgres:5432/eventos_db
      - DB_USER=postgres
      - DB_PASSWORD=root
    depends_on:
      - db-postgres
    networks:
      - ticketing-network

  ms-categorias:
    build:
      context: ./ms-categorias
    container_name: ms-categorias-container
    ports:
      - "8086:8086"
    environment:
      - DB_URL=jdbc:postgresql://db-postgres:5432/eventos_db
      - DB_USER=postgres
      - DB_PASSWORD=root
    depends_on:
      - db-postgres
    networks:
      - ticketing-network

  ms-reservas:
    build:
      context: ./ms-reservas
    container_name: ms-reservas-container
    ports:
      - "8087:8087"
    environment:
      - DB_URL=jdbc:postgresql://db-postgres:5432/eventos_db
      - DB_USER=postgres
      - DB_PASSWORD=root
    depends_on:
      - db-postgres
    networks:
      - ticketing-network

  ms-notificaciones:
    build:
      context: ./ms-notificaciones
    container_name: ms-notificaciones-container
    ports:
      - "8088:8088"
    environment:
      - DB_URL=jdbc:postgresql://db-postgres:5432/eventos_db
      - DB_USER=postgres
      - DB_PASSWORD=root
    depends_on:
      - db-postgres
    networks:
      - ticketing-network

  ms-reportes:
    build:
      context: ./ms-reportes
    container_name: ms-reportes-container
    ports:
      - "8089:8089"
    environment:
      - DB_URL=jdbc:postgresql://db-postgres:5432/eventos_db
      - DB_USER=postgres
      - DB_PASSWORD=root
    depends_on:
      - db-postgres
    networks:
      - ticketing-network

  ms-descuentos:
    build:
      context: ./ms-descuentos
    container_name: ms-descuentos-container
    ports:
      - "8090:8090"
    environment:
      - DB_URL=jdbc:postgresql://db-postgres:5432/eventos_db
      - DB_USER=postgres
      - DB_PASSWORD=root
    depends_on:
      - db-postgres
    networks:
      - ticketing-network

  # --- API GATEWAY (MANTENIDO SIN CAMBIOS DE BD) ---
  ms-gateway:
    build:
      context: ms-gateway
    container_name: ms-gateway-container
    ports:
      - "8091:8091"
    depends_on:
      - ms-usuarios
      - ms-eventos
      - ms-tickets
    networks:
      - ticketing-network

# --- CONFIGURACIÓN DE RED Y VOLÚMENES ---
networks:
  ticketing-network:
    driver: bridge

volumes:
  postgres_data: